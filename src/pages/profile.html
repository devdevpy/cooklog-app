<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — CookLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-body-tertiary">
    <div id="navbar"></div>

    <main class="container py-4 py-md-5">
      <div id="profileLoader" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 text-secondary">Loading your profile...</p>
      </div>

      <div id="profileContent" class="d-none">
        <header class="mb-4">
          <h1 class="h3 mb-1"><i class="bi bi-person-circle text-primary me-2"></i>My Profile</h1>
          <p class="text-secondary mb-0">Your account, avatar, and recipes.</p>
        </header>

        <div class="card border-0 shadow-sm mb-4">
          <div class="card-body p-4 d-flex flex-column flex-sm-row align-items-center gap-4">
            <div id="avatarPreview" class="profile-avatar-frame">
              <i class="bi bi-person-circle"></i>
            </div>
            <div class="flex-grow-1 text-center text-sm-start">
              <div class="d-flex align-items-center justify-content-center justify-content-sm-start gap-2 mb-1" id="fullNameDisplay">
                <h2 class="h4 mb-0" id="profileFullName">—</h2>
                <button type="button" class="btn btn-sm btn-link text-secondary p-0" id="editNameBtn" aria-label="Edit name">
                  <i class="bi bi-pencil"></i>
                </button>
              </div>
              <form id="editNameForm" class="d-none mb-1" novalidate>
                <div class="input-group input-group-sm mx-auto mx-sm-0" style="max-width: 280px;">
                  <input
                    type="text"
                    class="form-control"
                    id="fullNameInput"
                    name="fullName"
                    required
                    minlength="2"
                    autocomplete="name"
                  />
                  <button type="submit" class="btn btn-primary" id="saveNameBtn" aria-label="Save name">
                    <span class="spinner-border spinner-border-sm d-none" id="saveNameSpinner" role="status" aria-hidden="true"></span>
                    <i class="bi bi-check-lg" id="saveNameIcon"></i>
                  </button>
                  <button type="button" class="btn btn-outline-secondary" id="cancelNameBtn" aria-label="Cancel">
                    <i class="bi bi-x-lg"></i>
                  </button>
                </div>
                <div class="invalid-feedback d-block" id="nameError"></div>
              </form>
              <p class="text-secondary small mb-3">Your CookLog profile</p>
              <label for="avatarInput" class="btn btn-outline-primary btn-sm mb-0">
                <i class="bi bi-camera me-1"></i> Change avatar
              </label>
              <input type="file" id="avatarInput" accept="image/*" class="visually-hidden" />
              <span
                id="avatarSpinner"
                class="spinner-border spinner-border-sm text-primary ms-2 d-none"
                role="status"
                aria-hidden="true"
              ></span>
            </div>
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-12 col-sm-6">
            <div class="card border-0 shadow-sm h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <i class="bi bi-journal-richtext fs-2 text-primary"></i>
                <div>
                  <div class="fs-4 fw-bold" id="statTotalRecipes">—</div>
                  <div class="text-secondary small">Total Recipes</div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-12 col-sm-6">
            <div class="card border-0 shadow-sm h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <i class="bi bi-tags fs-2 text-primary"></i>
                <div>
                  <div class="fs-4 fw-bold" id="statTopCategory">—</div>
                  <div class="text-secondary small">Most-Used Category</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <h2 class="h5 section-header mb-3">
          <i class="bi bi-journal-richtext me-2"></i>My Recipes
        </h2>
        <div id="myRecipesContainer"><!-- grid / empty state rendered here --></div>
      </div>
    </main>

    <footer class="site-footer">
      <span class="site-footer-brand"><i class="bi bi-egg-fried"></i> CookLog</span>
      <span>&copy; 2026 CookLog. Cooked up with care.</span>
    </footer>

    <div
      class="modal fade"
      id="deleteRecipeModal"
      tabindex="-1"
      aria-labelledby="deleteRecipeModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="deleteRecipeModalLabel">
              <i class="bi bi-exclamation-triangle text-danger me-2"></i>Delete recipe?
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p class="mb-0">
              Are you sure you want to delete
              <strong id="deleteRecipeTitle">this recipe</strong>?
              This action cannot be undone.
            </p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
              <i class="bi bi-trash me-1"></i> Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/pages/profile.js"></script>
  </body>
</html>
