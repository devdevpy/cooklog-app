<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — CookLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body class="bg-body-tertiary">
    <div id="navbar"></div>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
          <div class="card shadow-sm border-0 auth-card">
            <div class="card-body p-4 p-sm-5">
              <div class="text-center mb-4">
                <i class="bi bi-egg-fried text-primary" style="font-size: 2.5rem;"></i>
                <h1 class="h3 mt-2 mb-1">Welcome back</h1>
                <p class="text-secondary mb-0">Log in to access your recipes.</p>
              </div>

              <div id="formAlert" class="alert d-none" role="alert"></div>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Email address</label>
                  <div class="input-group has-validation">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      name="email"
                      placeholder="you@example.com"
                      required
                      autocomplete="email"
                    />
                    <div class="invalid-feedback">Please enter a valid email address.</div>
                  </div>
                </div>

                <div class="mb-4">
                  <label for="password" class="form-label">Password</label>
                  <div class="input-group has-validation">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      name="password"
                      placeholder="Your password"
                      required
                      minlength="6"
                      autocomplete="current-password"
                    />
                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="togglePassword"
                      tabindex="-1"
                      aria-label="Show password"
                    >
                      <i class="bi bi-eye"></i>
                    </button>
                    <div class="invalid-feedback">Password must be at least 6 characters.</div>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2" id="submitBtn">
                  <span class="spinner-border spinner-border-sm d-none" id="submitSpinner" role="status" aria-hidden="true"></span>
                  <span id="submitLabel"><i class="bi bi-box-arrow-in-right"></i> Log in</span>
                </button>
              </form>

              <p class="text-center text-secondary mt-4 mb-0">
                Don't have an account?
                <a href="/src/pages/register.html" class="text-decoration-none">Register</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <span class="site-footer-brand"><i class="bi bi-egg-fried"></i> CookLog</span>
      <span>&copy; 2026 CookLog. Cooked up with care.</span>
    </footer>

    <script type="module">
      import 'bootstrap/dist/js/bootstrap.bundle.min.js'
      import { initNavbar } from '/src/components/navbar.js'
      import { initBackToTop } from '/src/components/back-to-top.js'
      import { signIn } from '/src/services/auth.js'
      import { consumeStoredToast } from '/src/js/toast.js'

      initNavbar('#navbar')
      initBackToTop()
      consumeStoredToast()

      const form = document.getElementById('loginForm')
      const alertBox = document.getElementById('formAlert')
      const submitBtn = document.getElementById('submitBtn')
      const spinner = document.getElementById('submitSpinner')
      const toggleBtn = document.getElementById('togglePassword')
      const passwordInput = document.getElementById('password')

      toggleBtn.addEventListener('click', () => {
        const isPw = passwordInput.type === 'password'
        passwordInput.type = isPw ? 'text' : 'password'
        toggleBtn.querySelector('i').className = isPw ? 'bi bi-eye-slash' : 'bi bi-eye'
      })

      function showAlert(type, message) {
        alertBox.className = `alert alert-${type}`
        alertBox.textContent = message
      }

      function setLoading(loading) {
        submitBtn.disabled = loading
        spinner.classList.toggle('d-none', !loading)
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        alertBox.className = 'alert d-none'

        if (!form.checkValidity()) {
          form.classList.add('was-validated')
          return
        }

        setLoading(true)
        try {
          await signIn({
            email: form.email.value.trim(),
            password: form.password.value,
          })
          // Success — go to the main recipes page.
          window.location.href = '/'
        } catch (err) {
          showAlert('danger', err?.message || 'Invalid email or password.')
          setLoading(false)
        }
      })
    </script>
  </body>
</html>
