<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CookLog — My Recipe Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-body-tertiary">
    <div id="navbar"></div>

    <main class="container py-4 py-md-5">
      <header class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
          <h1 class="h3 mb-1"><i class="bi bi-journal-richtext text-primary me-2"></i>Recipes</h1>
          <p class="text-secondary mb-0">Browse the CookLog community's recipes.</p>
        </div>
        <button id="randomBtn" type="button" class="btn btn-outline-primary d-inline-flex align-items-center gap-2">
          <i class="bi bi-shuffle"></i> Random Recipe
        </button>
      </header>

      <div class="row g-2 g-md-3 mb-4">
        <div class="col-12 col-md-6 col-lg-7">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input
              type="search"
              id="searchInput"
              class="form-control"
              placeholder="Search recipes by title…"
              autocomplete="off"
            />
          </div>
        </div>
        <div class="col-12 col-md-6 col-lg-5">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-funnel"></i></span>
            <select id="categoryFilter" class="form-select">
              <option value="">All categories</option>
            </select>
          </div>
        </div>
      </div>

      <div id="recipesContainer"><!-- states + grid rendered here --></div>
    </main>

    <!-- Random recipe modal -->
    <div class="modal fade" id="randomModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0">
          <div class="modal-header">
            <h5 class="modal-title"><i class="bi bi-shuffle me-2"></i>Your random pick</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="randomModalBody"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
